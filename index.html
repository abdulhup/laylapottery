<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>باركود ليلى</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Tajawal',sans-serif;
  background:#0a0a08;
  padding:20px;
}

/* خلفية صور فخار */
.bg{
  position:fixed;inset:0;z-index:0;
  background-image:url('https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?w=1400&q=90');
  background-size:cover;background-position:center;
  animation:zoom 20s ease-in-out infinite alternate;
}
@keyframes zoom{from{transform:scale(1)}to{transform:scale(1.08)}}
.bg-over{
  position:fixed;inset:0;z-index:1;
  background:linear-gradient(160deg,rgba(5,12,5,.82) 0%,rgba(10,20,8,.7) 50%,rgba(5,10,4,.88) 100%);
}

/* البطاقة */
.card{
  position:relative;z-index:2;
  width:100%;max-width:400px;
  border-radius:32px;overflow:hidden;
  border:1px solid rgba(168,200,112,.18);
  box-shadow:0 40px 100px rgba(0,0,0,.7);
  backdrop-filter:blur(30px);
  background:rgba(8,16,6,.75);
  animation:up .8s ease;
}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* هيدر البطاقة */
.card-top{
  padding:36px 28px 24px;text-align:center;
  border-bottom:1px solid rgba(168,200,112,.08);
  position:relative;overflow:hidden;
}
.card-top::before{
  content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:300px;height:200px;
  background:radial-gradient(ellipse,rgba(168,200,112,.1),transparent 70%);
  pointer-events:none;
}

.logo-wrap{
  width:80px;height:80px;margin:0 auto 16px;
  border-radius:50%;
  border:2px solid rgba(168,200,112,.3);
  display:flex;align-items:center;justify-content:center;
  background:rgba(20,40,16,.8);
  box-shadow:0 0 30px rgba(168,200,112,.1);
  overflow:hidden;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.logo-wrap .emoji{font-size:36px}

.brand{
  font-size:34px;font-weight:900;
  background:linear-gradient(135deg,#f0f4e8,#a8c870);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:4px;margin-bottom:4px;
}
.craft{font-size:12px;color:rgba(168,200,112,.45);letter-spacing:3px;margin-bottom:20px}

/* عبارة تسويقية */
.tagline-wrap{
  background:rgba(168,200,112,.06);
  border:1px solid rgba(168,200,112,.1);
  border-radius:16px;
  padding:16px 20px;
  margin-bottom:0;
}
.tagline-ar{
  font-size:17px;font-weight:700;
  color:#e8f0d8;line-height:1.8;margin-bottom:6px;
}
.tagline-ar span{
  background:linear-gradient(135deg,#a8c870,#c8e090);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.tagline-sub{font-size:12px;color:rgba(168,200,112,.45);font-weight:300;line-height:1.8}

/* QR */
.qr-area{padding:28px;text-align:center}
.qr-label{font-size:11px;color:rgba(168,200,112,.4);letter-spacing:2px;margin-bottom:16px}
#qrcode{
  display:inline-block;
  background:#fff;
  padding:16px;border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}
.qr-url{
  margin-top:14px;font-size:11px;
  color:rgba(168,200,112,.35);letter-spacing:.5px;
}

/* فوتر -->
.card-foot{
  padding:16px 28px 24px;
  display:flex;justify-content:center;gap:20px;
  border-top:1px solid rgba(168,200,112,.06);
}
.feat{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(168,200,112,.4)}
.feat-dot{width:4px;height:4px;border-radius:50%;background:rgba(168,200,112,.3)}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-over"></div>

<div class="card">
  <!-- هيدر -->
  <div class="card-top">
    <div class="logo-wrap">
      <img src="logo.png" alt="ليلى" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="emoji" style="display:none">🏺</span>
    </div>
    <div class="brand">ليلى</div>
    <div class="craft">حرق وصناعة الفخار</div>

    <div class="tagline-wrap">
      <div class="tagline-ar">من <span>الطين</span> تولد القصص<br>ومن <span>النار</span> يولد الفن</div>
      <div class="tagline-sub">كل قطعة فخار تحمل روح صانعها وأصالة التراث</div>
    </div>
  </div>

  <!-- QR -->
  <div class="qr-area">
    <div class="qr-label">امسح للوصول للموقع</div>
    <div id="qrcode"></div>
    <div class="qr-url">abdulhup.github.io/laylapottery</div>
  </div>

  <!-- فوتر -->
  <div class="card-foot">
    <div class="feat"><span class="feat-dot"></span> صناعة يدوية</div>
    <div class="feat"><span class="feat-dot"></span> حرق طبيعي</div>
    <div class="feat"><span class="feat-dot"></span> تصاميم فريدة</div>
  </div>
</div>

<script>
new QRCode(document.getElementById('qrcode'),{
  text:'https://abdulhup.github.io/laylapottery/',
  width:190,height:190,
  colorDark:'#1a2a14',
  colorLight:'#ffffff',
  correctLevel:QRCode.CorrectLevel.H
});
</script>
</body>
</html>
